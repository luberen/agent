model_list:
  # Intent Router / Planner
  - model_name: supervisor-router
    litellm_params:
      model: openai/gpt-4o
      api_base: https://azure.com
      api_key: "ghp_YOUR_GITHUB_PAT"

  # Heavy Structural Tasks (Gemini 2.5 Pro/Flash)
  - model_name: heavy-agent
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "AIzaSy_YOUR_KEY"
      # 2026 Fallback Management Strategy
      fallbacks: ["fast-agent"] 

  # Rapid Inner-Loop Coding & Terminal Validation (Groq)
  - model_name: fast-agent
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: "gsk_YOUR_KEY"

router_settings:
  routing_strategy: "latency-based-routing" # Routes to the fastest free endpoint
  allowed_fails: 1
  cooldown_time: 15
